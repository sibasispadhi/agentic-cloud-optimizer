spring:
  application:
    name: agent-cloud-optimizer
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8081}
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.cloudoptimizer: INFO
    org.springframework: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

agent:
  target-latency-ms: 100.0
  artifacts-dir: artifacts
  strategy: ${AGENT_STRATEGY:llm}  # llm (Ollama) or simple (rule-based)
  llm:
    # Concurrency output bounds — LLM recommendations are clamped to this range
    min-concurrency: 1
    max-concurrency: 100
    # Impact level thresholds (% change relative to current concurrency)
    impact:
      critical-change-pct: 50.0   # ≥50% change → CRITICAL
      high-change-pct: 25.0       # ≥25% change → HIGH
      medium-change-pct: 10.0     # ≥10% change → MEDIUM (else LOW)
    # Confidence score by change magnitude
    confidence:
      low-change: 0.90            # <10% change
      medium-change: 0.80         # <25% change
      large-change: 0.70          # <50% change
      very-large-change: 0.60     # ≥50% change
    fallback-confidence: 0.50     # returned when LLM is unavailable
  rules:
    # Latency / concurrency thresholds
    low-threshold-factor: 0.7          # fraction of target below which concurrency is reduced
    concurrency-scale-up-factor: 1.5   # multiplier when latency is too high
    concurrency-scale-down-factor: 0.75 # multiplier when latency is too low
    heap:
      # High-pressure triggers (Rule 1)
      gc-freq-high-per-sec: 1.0        # GC frequency above which heap pressure is high
      usage-high-percent: 80.0         # heap usage % above which pressure is high
      # Medium-pressure triggers (Rule 2)
      gc-pause-high-ms: 100.0          # GC pause avg above which latency impact is flagged
      usage-medium-percent: 70.0       # heap usage % threshold for medium-pressure rule
      # Over-provisioned triggers (Rule 3)
      gc-freq-low-per-sec: 0.5         # GC frequency below which heap is over-provisioned
      usage-low-percent: 50.0          # heap usage % below which heap is over-provisioned
      # Scale factors
      scale-up-large-factor: 1.5       # heap multiplier for high-pressure scenario
      scale-up-small-factor: 1.25      # heap multiplier for medium-pressure scenario
      scale-down-factor: 0.75          # heap multiplier for right-sizing
      min-heap-mb: 256                 # absolute minimum recommended heap in MB

  # ── Policy Engine (Phase 2) ──────────────────────────────────────────────────
  # Governance constraints evaluated before every actuation.
  # A DENIED or REQUIRES_APPROVAL decision blocks the after-test from running.
  policy:
    # Max allowed concurrency change relative to baseline (percentage, 0–100).
    # Example: 50.0 means concurrency may not increase/decrease by more than 50%.
    max-concurrency-delta-pct: 50.0

    # Max allowed heap size change relative to current heap (percentage, 0–100).
    max-heap-delta-pct: 50.0

    # Absolute concurrency bounds — proposed value must fall within this range.
    min-concurrency: 1
    max-concurrency: 100

    # Absolute heap size bounds (MB) — proposed value must fall within this range.
    min-heap-mb: 128
    max-heap-mb: 16384

    # Agent confidence below this threshold escalates to REQUIRES_APPROVAL.
    # Range [0.0, 1.0].  Set to 0.0 to disable confidence gating.
    min-confidence-to-act: 0.60

    # Minimum seconds between two applied changes.  0 = cooldown disabled.
    cooldown-seconds: 0

    # Resources the agent is never permitted to change.  Empty = no restrictions.
    # Example: ["jvm.heap_size_mb"] to lock heap size.
    forbidden-resources: []

    # Impact levels that require human approval before execution.
    # Valid values: LOW, MEDIUM, HIGH, CRITICAL
    impact-levels-requiring-approval:
      - CRITICAL

# SLO Breach Detection (Monitoring/Alerting layer)
slo:
  target-p99-ms: ${SLO_TARGET_P99_MS:100.0}
  breach-threshold: ${SLO_BREACH_THRESHOLD:1.2}
  breach-window-intervals: ${SLO_BREACH_WINDOW:3}
  enabled: ${SLO_ENABLED:true}

# Workload Simulator Configuration
# Run Mode Configuration
run:
  mode: ${RUN_MODE:web}  # Options: 'cli' (CommandLineRunner) or 'web' (WebSocket server)

workload:
  simulator: demo  # Options: 'demo' (built-in) or 'http' (external REST API)

# HTTP REST Simulator Configuration
http:
  base-url: https://httpbin.org
  endpoint: /delay/0  # Fast endpoint for testing
  method: GET         # GET, POST, PUT, DELETE
  headers: '{"Content-Type":"application/json","Accept":"application/json"}'  # Optional JSON headers
  body: ''            # Optional request body (for POST/PUT)

metrics:
  directory: data/metrics
  application-name: agent-cloud-optimizer
