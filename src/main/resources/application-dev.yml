spring:
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3.2:1b}
          temperature: 0.7
          # Additional options for optimization
          num-predict: 500
          top-p: 0.9

logging:
  level:
    com.cloudoptimizer: DEBUG
    org.springframework.ai: DEBUG

# Agent configuration
agent:
  target-latency-ms: 100.0
  artifacts-dir: artifacts
  strategy: ${AGENT_STRATEGY:simple}  # simple or llm
