spring:
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL}
      chat:
        options:
          model: ${OLLAMA_MODEL}
          temperature: 0.7

logging:
  level:
    com.cloudoptimizer: INFO
    org.springframework: WARN

# Agent configuration
agent:
  strategy: ${AGENT_STRATEGY:llm}  # LLM-powered optimization (simple mode only for fallback)
