# =============================================================================
# Agent Cloud Optimizer - Docker Compose (Full Stack with Ollama)
# =============================================================================
# Start: docker compose up
# Stop:  docker compose down
# Open:  http://localhost:8081/live-dashboard.html
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # ACO - Agent Cloud Optimizer
  # ---------------------------------------------------------------------------
  aco:
    build: .
    container_name: aco
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - AGENT_STRATEGY=llm
      - ACO_LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      - JAVA_OPTS=-Xms256m -Xmx512m
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/v1/work/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - aco-network

  # ---------------------------------------------------------------------------
  # Ollama - Local LLM Server
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - aco-network
    # Pull llama3.2 model on first run (async)
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull llama3.2:3b; wait"]

volumes:
  ollama_data:
    driver: local

networks:
  aco-network:
    driver: bridge
