name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Create Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
    - name: Build project
      run: mvn clean package -DskipTests -B
      
    - name: Run tests
      run: mvn test -B
      
    - name: Generate changelog
      id: changelog
      run: |
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        cat CHANGELOG.md | sed -n '/## \[${{ steps.get_version.outputs.VERSION }}\]/,/## \[/p' | sed '$d' >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
      
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        body: |
          ## Agent Cloud Optimizer ${{ steps.get_version.outputs.VERSION }}
          
          See [CHANGELOG.md](CHANGELOG.md) for details.
          
          ### Quick Start
          
          ```bash
          # Download the JAR
          wget https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.VERSION }}/agent-cloud-optimizer-${{ steps.get_version.outputs.VERSION }}.jar
          
          # Run with SimpleAgent (rule-based)
          java -jar agent-cloud-optimizer-${{ steps.get_version.outputs.VERSION }}.jar
          
          # Or with LLM Agent (requires Ollama)
          java -Dagent.strategy=llm -jar agent-cloud-optimizer-${{ steps.get_version.outputs.VERSION }}.jar
          ```
          
          ### Documentation
          
          - [Quick Start Guide](docs/START_HERE.md)
          - [Learning Guide](docs/LEARNING_GUIDE.md)
          - [Ollama Setup](docs/OLLAMA_SETUP.md)
          - [Contributing](CONTRIBUTING.md)
        files: |
          target/agent-cloud-optimizer-*.jar
          CHANGELOG.md
          README.md
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'alpha') || contains(steps.get_version.outputs.VERSION, 'beta') || contains(steps.get_version.outputs.VERSION, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
